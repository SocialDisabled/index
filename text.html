<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kurlet</title>
<link rel="icon" type="image/x-icon" href="/kurlet.ico">
<link rel="preload" href="photo/44.webp" as="image">
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}


.bg-fixed {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: url("photo/44.webp") center top / cover no-repeat;
}
body {
  min-height: 100vh;
  padding: 0 20px;
  padding-top: 70px;
}


.top-nav{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 999;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.top-nav a{
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.9;
  cursor: pointer;
}
.top-nav a:hover{
  opacity: 1;
}

/* 全屏下拉菜单 */
.full-dropdown {
  position: fixed;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100vh - 60px);
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 998;
  transform: translateY(-100%);
  transition: transform 0.4s ease;
  display: grid;
  grid-template-columns: 1fr 4fr;
  color: #fff;
  pointer-events: none;
  visibility: hidden;
}
.full-dropdown.open {
  transform: translateY(0);
  pointer-events: auto;
  visibility: visible;
}

.full-dropdown-left {
  background: rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
}
.full-dropdown-item {
  padding: 0 30px;
  flex: 1;
  display: flex;
  align-items: center;
  cursor: pointer;
  border-left: 4px solid transparent;
  transition: 0.2s;
  font-size: 16px;
  background: transparent;
}
.full-dropdown-item.active {
  background: rgba(0,0,0,0.35);
  border-left-color: #ffd288;
}
.full-dropdown-item:hover {
  background: rgba(255,255,255,0.08);
}

.full-dropdown-right {
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.full-dropdown-title {
  font-size: 26px;
  margin-bottom: 16px;
}
.full-dropdown-desc {
  font-size: 16px;
  opacity: 0.85;
  margin-bottom: 24px;
  line-height: 1.7;
  max-width: 600px;
}
.full-dropdown-link {
  display: inline-block;
  padding: 12px 30px;
  border-radius: 30px;
  background: #ffd288;
  color: #000;
  text-decoration: none;
  font-size: 16px;
  width: fit-content;
}
.full-dropdown-link:hover {
  background: #ffdfaa;
}

@media (max-width: 720px) {
  .top-nav {
    gap: 12px;
  }
  .top-nav a {
    font-size: 12px;
  }
  .full-dropdown {
    grid-template-columns: 1fr 2fr;
  }
  .full-dropdown-title {
    font-size: 20px;
  }
  .full-dropdown-desc {
    font-size: 14px;
  }
  .full-dropdown-item {
    padding: 0 15px;
    font-size: 14px;
  }
}


.wrap-box{
  max-width: 98vw;
  margin: 20px auto;
}


.text-box{
  width: 100%;
  padding: 40px 32px;
  background: rgba(255,255,255,0.88);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  line-height: 1.8;
  font-size: 16px;
  color: #222;
  white-space: pre-wrap; 
}

@media (max-width: 720px) {
  .text-box {
    padding: 24px 16px;
    font-size: 15px;
  }
}


.pagination{
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  margin-top: 24px;
}
.page-btn{
  padding: 10px 24px;
  border: none;
  border-radius: 30px;
  background: #ffd288;
  color: #000;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.page-btn:hover{
  background: #ffdfaa;
}
.page-btn:disabled{
  background: rgba(0,0,0,0.2);
  color: #fff;
  cursor: not-allowed;
}
#pageInfo{
  color: #fff;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="bg-fixed"></div>


<div class="top-nav">
  <a href="gallery.html">图片</a>
  <a href="">视频</a>
  <a href="">下载</a>
  <a href="#">支持</a>
  <a href="index.html">主页</a>
  <a id="moreToggle">更多</a>
</div>

<div class="full-dropdown" id="fullDropdown">
  <div class="full-dropdown-left">
    <div class="full-dropdown-item active" data-id="mod">MC联机</div>
    <div class="full-dropdown-item" data-id="launcher">泰拉瑞亚联机</div>
    <div class="full-dropdown-item" data-id="guide">星露谷联机</div>
    <div class="full-dropdown-item" data-id="faq">饥荒联机</div>
    <div class="full-dropdown-item" data-id="community">待开发</div>
  </div>
  <div class="full-dropdown-right" id="dropdownRight">
    <h3 class="full-dropdown-title">MC联机</h3>
    <p class="full-dropdown-desc">简简单单的服务器，没啥亮眼。</p>
    <a class="full-dropdown-link" href="https://kurlet.com" target="_blank">前往查看</a>
  </div>
</div>

<div class="wrap-box">

  <div class="text-box" id="textContainer">
这是一个文本
  </div>


  <div class="pagination">
    <button class="page-btn" id="prevPage">上一页</button>
    <span id="pageInfo">第1页 / 共1页</span>
    <button class="page-btn" id="nextPage">下一页</button>
  </div>
</div>

<script>

const textPages = [
`你好哇，这里啥也没有
`,
`啥也没有
`,
`都说了，啥也没有
`,
`不信？好你继续翻
`,
`你会后悔的！！！！！！！！！！！！！！！！！！
`,
`禁止一般人接触的编年史，写法混杂了寓言和纪年。从开天辟地写到了大日御舆落成。



我们想要记录的事情，是天上的意志如何在大地上拥有了形态。啊，天上之神，这些创造都是你们的作为。那就请你们启发我的神智，让我源源不断地记录。

【鸽子衔枝之年】

天上永恒的王座到来，世界为之焕然一新。然后真王，原初的那一位开始和旧世界的主人们，七位恐怖大王开战。那恐怖的大王们是龙。

原初的那一位造出了自己发着光的影子。而影子的数量是四。

【法涅斯，或者原初的那一位】

原初的那一位，或许是法涅斯。它生着羽翼，头戴王冠，从蛋中出生，难以分辨雌雄。但是世界如果要被创造，蛋壳必须被打破。法涅斯——原初的那一位——却用蛋壳隔绝了「宇宙」和「世界的缩影」。

【衔枝后四十余年】

四十个冬天埋葬了火，四十个夏天沸腾了海。七位大王全部被打败，七个王国全部对天上俯首称臣。原初的那一位大王开始了天地的创造。为了「我们」——它最可怜的人儿将在出现在这片大地。

…

【衔枝的四百余年】

山川与河流落成，大海和大洋接纳了反叛者和不从者。原初的那一位和一位影子制造出了飞鸟、走兽和水鱼。它们还一起制造出了花草和树木。最后它们造出了人。我们的先祖的数目不可知晓。

自此时起，我们先祖和原初的那一位立约。纪年也更迭一新。

【箱舟开门之年】

原初的那一位对人有一套神圣的规划。人只要幸福，它便欢欣。

【箱舟开门的次年】

人们耕耘，第一次收获。人们开掘，第一次收获贵金。人们聚集，第一次写就诗歌。

【狂欢节之年】

如果有饥馑，天上就落下食物与甘霖。如果有贫瘠，那大地就会生出矿藏。如果有忧郁蔓延，那么高天就会以声音回应。

唯一的禁止之事，就是输给诱惑。但是诱惑的通道已经被封堵。

…

【葬火之年】

天上的第二个王座到来，仿佛创世之初的大战再开。那一天，天也倾颓，地也崩裂。我们海渊之民的先祖，和他们世代栖居的土地，落入了此处。

黑暗的年代由此开始。

【黑暗的元年】

七位大王的子民被海接纳，深海的龙嗣曾经统治这里。我们的先祖与它们发生了征战。

先祖使用千灯将它们逐入影子，它们则在影子里狩猎人类。此处唯有黑暗，所以无处不是它们的猎场。

人们的祈祷汇成哀歌，原初的那一位和其他三位发光的影子并不能听见。

【太阳的比喻】

黑暗的洞窟里，有一群未曾见过光的人们在生活。有一位见过太阳的贤人，对着洞窟的众人描绘着光之下的生活与太阳的伟大。他见众人无法理解，于是点起了火。人们于是开始崇拜火，以为这个是太阳，甚至开始习惯了黑暗与火光的生活。

贤人死后，有人霸占了火，通过火，投下了自己巨大的影子。

【忘忧莲的比喻】

看见就会忘记忧愁的莲花。在漫长的旅行中，寻找归途的船长遇到了一群以这种莲花为食的人。有的人留下了，有的人抗拒了这种诱惑。

活着就是无尽的苦海。我们只是在寻找归途。

【黑暗的第三年】

唯一没有抛弃我们的那一位，她乃是「时间之执政」。她是时刻，是无时不刻，是千风与日月之度量。她是一切欢欣之时，一切愤怒之时，一切渴望之时，一切迷狂之时。她是一切谵妄的时刻。

我们称呼她「卡伊洛斯」，或者「不变世界的统领与执政」。真正秘密的名字，我们不敢直言，所以在这里倒写。「露塔斯伊」——我仅提一次。

…

【目盲之年】

贤人阿布拉克他被开启了神智，他展示了从手中发出光的奇迹。先祖们以他为首领，开始建设「赫利俄斯」。

…

【目明之年，或日月的元年】

「赫利俄斯」——太阳的神车，终于落成。白夜到来，常夜消散。

日月的纪年开始了。

【日月的二年】

先祖们尝试寻找归途。地表的大战应该已经结束。

但是原初的那一位，第一个王座，布下了禁令。先祖们无法找到归家之路。

既然是如此，那原初的那一位，应该打败了后来的第二位吧。

阿布拉克被太阳之子下令囚禁。

【树的比喻】

王的园丁与御园的树精相爱。但是国王想要新修凉亭的雕梁，需要砍伐最有灵气的那一棵灵木。国王是原初的那位之化身，因此园丁无法违逆万王之王，唯有对着国王的祭司祈祷。祭司乃是常世大神的化身。

祭司怜悯园丁，于是说，你去折下灵树的枝条吧。园丁便去折枝，然后听从国王的命令砍伐了灵木。

随后祭司说，你去种下灵木的枝吧。园丁说，灵木长成，需要五百年。祭司说，一念则千劫尽。于是园丁在自家后院种下了树枝。结果一瞬间，细枝长成了新树，那新树精是曾经树精的延续。

因为那时刻之神，可以把「种子」的「这一刻」带到过去与未来。

【日月之十年】

阿布拉克故去已久。日月之前的事情已经记录得足够。若无把一切按事实记写的胆量，哪里能成为常世大神的书记呢？

我听到了门外盔甲的声音，我于此绝笔。
`

];

let currentPage = 1;
const totalPage = textPages.length;

const textContainer = document.getElementById('textContainer');
const prevBtn = document.getElementById('prevPage');
const nextBtn = document.getElementById('nextPage');
const pageInfo = document.getElementById('pageInfo');


function renderText(){
  textContainer.innerText = textPages[currentPage - 1];
  pageInfo.textContent = `第${currentPage}页 / 共${totalPage}页`;
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPage;
}


prevBtn.onclick = ()=>{
  if(currentPage > 1){
    currentPage--;
    renderText();
  }
}

nextBtn.onclick = ()=>{
  if(currentPage < totalPage){
    currentPage++;
    renderText();
  }
}


renderText();


const moreToggle = document.getElementById('moreToggle');
const fullDropdown = document.getElementById('fullDropdown');
const leftItems = document.querySelectorAll('.full-dropdown-item');
const dropdownRight = document.getElementById('dropdownRight');

const menuData = {
  mod: {
    title: "MC联机",
    desc: "简简单单的服务器，没啥亮眼。",
    link: "https://kurlet.com"
  },
  launcher: {
    title: "泰拉瑞亚联机",
    desc: "还没开始做，目前只有MC联机。",
    link: "https://kurlet.com"
  },
  guide: {
    title: "星露谷联机",
    desc: "其实你完全可以走steam联机的对吧。",
    link: "https://kurlet.com"
  },
  faq: {
    title: "饥荒联机",
    desc: "还没搞，其实steam联机也不是不行。",
    link: "https://kurlet.com"
  },
  community: {
    title: "待开发",
    desc: "没准有个大的。",
    link: "https://kurlet.com"
  }
};

function updatePanel(id) {
  const data = menuData[id];
  dropdownRight.innerHTML = `
    <h3 class="full-dropdown-title">${data.title}</h3>
    <p class="full-dropdown-desc">${data.desc}</p>
    <a class="full-dropdown-link" href="${data.link}" target="_blank">前往查看</a>
  `;
  leftItems.forEach(item => item.classList.remove('active'));
  document.querySelector(`.full-dropdown-item[data-id="${id}"]`).classList.add('active');
}

function toggleDropdown() {
  fullDropdown.classList.toggle('open');
}
moreToggle.addEventListener('click', toggleDropdown);

leftItems.forEach(item => {
  item.addEventListener('click', () => {
    updatePanel(item.dataset.id);
  });
});

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') {
    fullDropdown.classList.remove('open');
  }
});

document.addEventListener('click', (e) => {
  if (!fullDropdown.contains(e.target) && e.target !== moreToggle) {
    fullDropdown.classList.remove('open');
  }
});
</script>
</body>
</html>
