<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>库乐特</title>
<link rel="icon" type="image/x-icon" href="/kurlet.ico">
<link rel="preload" href="photo/44.webp" as="image">
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

.bg-fixed {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: url("photo/44.webp") center top / cover no-repeat;
}
body {
  min-height: 100vh;
  padding: 0 20px;
  padding-top: 70px;
}

.top-nav{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 999;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.top-nav a{
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.9;
  cursor: pointer;
}
.top-nav a:hover{
  opacity: 1;
}


.full-dropdown {
  position: fixed;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100vh - 60px);
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 998;
  transform: translateY(-100%);
  transition: transform 0.4s ease;
  display: grid;
  grid-template-columns: 1fr 4fr;
  color: #fff;
  pointer-events: none;
  visibility: hidden;
}
.full-dropdown.open {
  transform: translateY(0);
  pointer-events: auto;
  visibility: visible;
}

.full-dropdown-left {
  background: rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
}
.full-dropdown-item {
  padding: 0 30px;
  flex: 1;
  display: flex;
  align-items: center;
  cursor: pointer;
  border-left: 4px solid transparent;
  transition: 0.2s;
  font-size: 16px;
  background: transparent;
}
.full-dropdown-item.active {
  background: rgba(0,0,0,0.35);
  border-left-color: #ffd288;
}
.full-dropdown-item:hover {
  background: rgba(255,255,255,0.08);
}

.full-dropdown-right {
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.full-dropdown-title {
  font-size: 26px;
  margin-bottom: 16px;
}
.full-dropdown-desc {
  font-size: 16px;
  opacity: 0.85;
  margin-bottom: 24px;
  line-height: 1.7;
  max-width: 600px;
}
.full-dropdown-link {
  display: inline-block;
  padding: 12px 30px;
  border-radius: 30px;
  background: #ffd288;
  color: #000;
  text-decoration: none;
  font-size: 16px;
  width: fit-content;
}
.full-dropdown-link:hover {
  background: #ffdfaa;
}

@media (max-width: 720px) {
  .top-nav {
    gap: 12px;
  }
  .top-nav a {
    font-size: 12px;
  }
  .full-dropdown {
    grid-template-columns: 1fr 2fr;
  }
  .full-dropdown-title {
    font-size: 20px;
  }
  .full-dropdown-desc {
    font-size: 14px;
  }
  .full-dropdown-item {
    padding: 0 15px;
    font-size: 14px;
  }
}

.wrap-box{
  max-width: 98vw;
  margin: 10px auto;
}

.gallery-grid{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 12px;
  background: rgba(255,255,255,0.88);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}
.gallery-item{
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 16/9;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  transition: transform 0.2s ease;
  cursor: pointer;
}
.gallery-item:hover{
  transform: scale(1.03);
}
.gallery-item img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.pagination{
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  margin-top: 24px;
}
.page-btn{
  padding: 10px 24px;
  border: none;
  border-radius: 30px;
  background: #ffd288;
  color: #000;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.page-btn:hover{
  background: #ffdfaa;
}
.page-btn:disabled{
  background: rgba(0,0,0,0.2);
  color: #fff;
  cursor: not-allowed;
}
#pageInfo{
  color: #fff;
  font-size: 14px;
}


@media (max-width: 900px){
  .gallery-grid{ grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 480px){
  .gallery-grid{ grid-template-columns: 1fr; }
  .gallery-grid {
    padding: 20px 15px;
  }
}


.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.lightbox.active {
  display: flex;
}
.lightbox-img {
  max-width: calc(100% - 4rem);
  max-height: calc(100vh - 4rem);
  border-radius: 8px;
  object-fit: contain;
  box-shadow: 0 0 40px #000;
}
.lightbox-close {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  z-index: 10;
}
.lightbox-close:hover {
  background: rgba(255,255,255,0.3);
}
</style>
</head>
<body>
<div class="bg-fixed"></div>

<div class="top-nav">
  <a href="gallery.html">图片</a>
  <a href="">视频</a>
  <a href="">下载</a>
  <a href="#">支持</a>
  <a href="index.html">主页</a>
  <a id="moreToggle">更多</a>
</div>

<div class="full-dropdown" id="fullDropdown">
  <div class="full-dropdown-left">
    <div class="full-dropdown-item active" data-id="mod">MC联机</div>
    <div class="full-dropdown-item" data-id="launcher">泰拉瑞亚联机</div>
    <div class="full-dropdown-item" data-id="guide">星露谷联机</div>
    <div class="full-dropdown-item" data-id="faq">饥荒联机</div>
    <div class="full-dropdown-item" data-id="community">待开发</div>
  </div>
  <div class="full-dropdown-right" id="dropdownRight">
    <h3 class="full-dropdown-title">MC联机</h3>
    <p class="full-dropdown-desc">简简单单的服务器，没啥亮眼。</p>
    <a class="full-dropdown-link" href="https://kurlet.com" target="_blank">前往查看</a>
  </div>
</div>

<div class="wrap-box">
  <div class="gallery-grid" id="galleryContainer"></div>
  <div class="pagination">
    <button class="page-btn" id="prevPage">上一页</button>
    <span id="pageInfo">第1页</span>
    <button class="page-btn" id="nextPage">下一页</button>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">&times;</span>
  <img class="lightbox-img" id="lightboxImg" src="" alt="大图预览">
</div>

<script>
const imgList = [
  "photo/LXHCY.webp","photo/11.webp","photo/22.webp","photo/33.webp","photo/44.webp",
  "photo/55.webp","photo/66.webp","photo/77.webp","photo/88.webp","photo/LXHCY.webp","photo/11.webp","photo/22.webp","photo/33.webp","photo/44.webp",
  "photo/55.webp","photo/66.webp","photo/77.webp","photo/88.webp",
  
];
const perPage = 12;
let currentPage = 1;
const totalPage = Math.ceil(imgList.length / perPage);

const container = document.getElementById('galleryContainer');
const prevBtn = document.getElementById('prevPage');
const nextBtn = document.getElementById('nextPage');
const pageInfo = document.getElementById('pageInfo');

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');

function renderGallery(){
  container.innerHTML = '';
  const start = (currentPage - 1) * perPage;
  const end = start + perPage;
  const pageImgs = imgList.slice(start, end);

  pageImgs.forEach(src=>{
    const div = document.createElement('div');
    div.className = 'gallery-item';
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    img.alt = '服务器图片';
    
    img.addEventListener('click', ()=>{
      lightboxImg.src = src;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden'; 
    });
    div.appendChild(img);
    container.appendChild(div);
  });

  pageInfo.textContent = `第${currentPage}页 / 共${totalPage}页`;
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPage;
}

function closeLightbox(){
  lightbox.classList.remove('active');
  lightboxImg.src = '';
  document.body.style.overflow = '';
}

lightboxClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e)=>{
  if(e.target === lightbox) closeLightbox();
});
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape' && lightbox.classList.contains('active')) closeLightbox();
});

prevBtn.onclick = ()=>{
  if(currentPage>1){ currentPage--; renderGallery(); }
}
nextBtn.onclick = ()=>{
  if(currentPage<totalPage){ currentPage++; renderGallery(); }
}

renderGallery();

// ===== 全屏下拉菜单逻辑 =====
const moreToggle = document.getElementById('moreToggle');
const fullDropdown = document.getElementById('fullDropdown');
const leftItems = document.querySelectorAll('.full-dropdown-item');
const dropdownRight = document.getElementById('dropdownRight');

const menuData = {
  mod: {
    title: "MC联机",
    desc: "简简单单的服务器，没啥亮眼。",
    link: "https://kurlet.com"
  },
  launcher: {
    title: "泰拉瑞亚联机",
    desc: "还没开始做，目前只有MC联机。",
    link: "https://kurlet.com"
  },
  guide: {
    title: "星露谷联机",
    desc: "其实你完全可以走steam联机的对吧。",
    link: "https://kurlet.com"
  },
  faq: {
    title: "饥荒联机",
    desc: "还没搞，其实steam联机也不是不行。",
    link: "https://kurlet.com"
  },
  community: {
    title: "待开发",
    desc: "没准有个大的。",
    link: "https://kurlet.com"
  }
};

function updatePanel(id) {
  const data = menuData[id];
  dropdownRight.innerHTML = `
    <h3 class="full-dropdown-title">${data.title}</h3>
    <p class="full-dropdown-desc">${data.desc}</p>
    <a class="full-dropdown-link" href="${data.link}" target="_blank">前往查看</a>
  `;
  leftItems.forEach(item => item.classList.remove('active'));
  document.querySelector(`.full-dropdown-item[data-id="${id}"]`).classList.add('active');
}

function toggleDropdown() {
  fullDropdown.classList.toggle('open');
}
moreToggle.addEventListener('click', toggleDropdown);

leftItems.forEach(item => {
  item.addEventListener('click', () => {
    updatePanel(item.dataset.id);
  });
});

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') {
    fullDropdown.classList.remove('open');
  }
});

document.addEventListener('click', (e) => {
  if (!fullDropdown.contains(e.target) && e.target !== moreToggle) {
    fullDropdown.classList.remove('open');
  }
});
</script>

</body>
</html>
