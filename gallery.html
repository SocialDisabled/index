<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MC基岩JAVA互通服务器 - 图片</title>
<link rel="preload" href="photo/44.webp" as="image">
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

.bg-fixed {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: url("photo/44.webp") center top / cover no-repeat;
}
body {
  min-height: 100vh;
  padding: 0 20px;
  padding-top: 70px;
}

.top-nav{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 999;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.top-nav a{
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.9;
}
.top-nav a:hover{
  opacity: 1;
}
/* 导航移动端适配 和首页统一 */
@media (max-width: 720px) {
  .top-nav {
    gap: 12px;
  }
  .top-nav a {
    font-size: 12px;
  }
}

.wrap-box{
  max-width: 98vw;
  margin: 10px auto;
}

.gallery-grid{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 12px;
  background: rgba(255,255,255,0.88);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}
.gallery-item{
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 16/9;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  transition: transform 0.2s ease;
  cursor: pointer;
}
.gallery-item:hover{
  transform: scale(1.03);
}
.gallery-item img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.pagination{
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  margin-top: 24px;
}
.page-btn{
  padding: 10px 24px;
  border: none;
  border-radius: 30px;
  background: #ffd288;
  color: #000;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.page-btn:hover{
  background: #ffdfaa;
}
.page-btn:disabled{
  background: rgba(0,0,0,0.2);
  color: #fff;
  cursor: not-allowed;
}
#pageInfo{
  color: #fff;
  font-size: 14px;
}

/* 栅格响应式 与首页尺寸匹配 */
@media (max-width: 900px){
  .gallery-grid{ grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 480px){
  .gallery-grid{ grid-template-columns: 1fr; }
  .gallery-grid {
    padding: 20px 15px;
  }
}

/* 大图预览灯箱 深色遮罩和首页弹窗统一 */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.lightbox.active {
  display: flex;
}
.lightbox-img {
  max-width: calc(100% - 4rem);
  max-height: calc(100vh - 4rem);
  border-radius: 8px;
  object-fit: contain;
  box-shadow: 0 0 40px #000;
}
.lightbox-close {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  z-index: 10;
}
.lightbox-close:hover {
  background: rgba(255,255,255,0.3);
}
</style>
</head>
<body>
<div class="bg-fixed"></div>

<div class="top-nav">
  <a href="gallery.html">图片</a >
  <a href="">视频</a >
  <a href="">下载</a >
  <a href="#">支持</a >
  <a href="index.html">主页</a >
  <a href="#">获取启动器</a >
</div>

<div class="wrap-box">
  <div class="gallery-grid" id="galleryContainer"></div>
  <div class="pagination">
    <button class="page-btn" id="prevPage">上一页</button>
    <span id="pageInfo">第1页</span>
    <button class="page-btn" id="nextPage">下一页</button>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">&times;</span>
  <img class="lightbox-img" id="lightboxImg" src="" alt="大图预览">
</div>

<script>
const imgList = [
  "photo/LXHCY.webp","photo/11.webp","photo/22.webp","photo/33.webp","photo/44.webp",
  "photo/55.webp","photo/66.webp","photo/77.webp","photo/88.webp",
];
const perPage = 12;
let currentPage = 1;
const totalPage = Math.ceil(imgList.length / perPage);

const container = document.getElementById('galleryContainer');
const prevBtn = document.getElementById('prevPage');
const nextBtn = document.getElementById('nextPage');
const pageInfo = document.getElementById('pageInfo');

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');

function renderGallery(){
  container.innerHTML = '';
  const start = (currentPage - 1) * perPage;
  const end = start + perPage;
  const pageImgs = imgList.slice(start, end);

  pageImgs.forEach(src=>{
    const div = document.createElement('div');
    div.className = 'gallery-item';
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    img.alt = '服务器图片';
    
    img.addEventListener('click', ()=>{
      lightboxImg.src = src;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden'; 
    });
    div.appendChild(img);
    container.appendChild(div);
  });

  pageInfo.textContent = `第${currentPage}页 / 共${totalPage}页`;
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPage;
}

function closeLightbox(){
  lightbox.classList.remove('active');
  lightboxImg.src = '';
  document.body.style.overflow = '';
}

lightboxClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e)=>{
  if(e.target === lightbox) closeLightbox();
});
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape' && lightbox.classList.contains('active')) closeLightbox();
});

prevBtn.onclick = ()=>{
  if(currentPage>1){ currentPage--; renderGallery(); }
}
nextBtn.onclick = ()=>{
  if(currentPage<totalPage){ currentPage++; renderGallery(); }
}

renderGallery();
</script>

</body>
</html>
