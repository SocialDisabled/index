<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MC基岩JAVA互通服务器官网</title>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}
/* 顶部导航栏 悬浮在最上方 */
.top-nav{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 999;
}
.top-nav a{
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.9;
}
.top-nav a:hover{
  opacity: 1;
}
/* 全屏轮播容器 */
.slider-box {
  width: 100vw;
  min-height: 85vh;
  overflow: hidden;
  position: relative;
  margin-top: 0;
}
/* 图片滑动轨道 */
.slider-wrap {
  width: 800%;
  height: 100%;
  display: flex;
  transition: 0.6s ease;
}
.slider-item {
  width: 100%;
  height: 100%;
}
.slider-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
/* 底部渐变暗遮罩 方便显示文字 */
.slider-mask {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 65%);
  z-index: 2;
}
/* 左下角宣传文字按钮 */
.slider-text {
  position: absolute;
  left: 8%;
  bottom: 120px;
  z-index: 3;
  color: white;
}
.slider-text p{
  font-size: 16px;
  margin-bottom: 8px;
  opacity: 0.85;
}
.slider-text h2 {
  font-size: 44px;
  margin: 10px 0 20px;
}
.slider-text button {
  padding: 11px 28px;
  border-radius: 30px;
  border: none;
  background: #ffd288;
  font-size: 16px;
  cursor: pointer;
  color: #000;
}
.slider-text button:hover{
  background: #ffdfaa;
}
/* 左右切换按钮 */
.slider-btn {
  width: 40px;
  height: 60px;
  background: rgba(0,0,0,0.35);
  color: #fff;
  font-size: 26px;
  border: none;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  z-index: 4;
}
.slider-btn:hover{
  background: rgba(0,0,0,0.55);
}
.prev { left: 10px; }
.next { right: 10px; }
/* 底部小圆点指示器 */
.slider-dots {
  position: absolute;
  bottom: 40px;
  right: 8%;
  display: flex;
  gap: 8px;
  z-index: 4;
}
.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #ffffff50;
  cursor: pointer;
}
.dot.active {
  background: #fff;
}
/* 页面下方正文内容 */
.main-content{
  max-width: 1200px;
  margin: 40px auto;
  padding: 0 20px;
}
.main-content h6{
  color: #666;
  font-size: 16px;
  margin-bottom: 10px;
}
.main-content h1{
  font-size: 32px;
  color: #222;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<!-- 顶部导航 -->
<div class="top-nav">
  <a href=" ">游戏</a >
  <a href="#">新闻通讯</a >
  <a href="#">视频</a >
  <a href="#">下载</a >
  <a href="#">商店</a >
  <a href="#">支持</a >
  <a href="#">获取启动器</a >
</div>

<!-- GTA风格全屏轮播 -->
<div class="slider-box">
  <div class="slider-wrap">
    <div class="slider-item"><img src="photo/1.png" alt="图1"></div>
    <div class="slider-item"><img src="photo/2.png" alt="图2"></div>
    <div class="slider-item"><img src="photo/3.png" alt="图3"></div>
    <div class="slider-item"><img src="photo/4.png" alt="图4"></div>
    <div class="slider-item"><img src="photo/5.png" alt="图5"></div>
    <div class="slider-item"><img src="photo/6.png" alt="图6"></div>
    <div class="slider-item"><img src="photo/7.png" alt="图7"></div>
    <div class="slider-item"><img src="photo/8.png" alt="图8"></div>
  </div>
  <!-- 渐变遮罩 -->
  <div class="slider-mask"></div>
  <!-- 左下角文字按钮 -->
  <div class="slider-text">
    <p>MC基岩&Java互通服务器</p >
    <h2>立即加入游玩</h2>
    <button>了解更多</button>
  </div>
  <!-- 左右切换按钮 -->
  <button class="slider-btn prev">&lt;</button>
  <button class="slider-btn next">&gt;</button>
  <!-- 右下角圆点 -->
  <div class="slider-dots"></div>
</div>

<!-- 页面原有正文内容 -->
<div class="main-content">
  <h6>这是一个服务器</h6>
  <h1>这是一个官网</h1>
</div>

<script>
// 轮播配置
const total = 8;
let index = 0;
const wrap = document.querySelector('.slider-wrap');
const dotsBox = document.querySelector('.slider-dots');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');
let timer;

// 生成底部圆点
for(let i=0; i<total; i++){
  const dot = document.createElement('span');
  dot.className = 'dot';
  if(i === 0) dot.classList.add('active');
  dotsBox.appendChild(dot);
  dot.onclick = ()=>{
    index = i;
    changeSlide();
  }
}
const dots = document.querySelectorAll('.dot');

// 更新滑动位置和圆点状态
function changeSlide(){
  wrap.style.transform = `translateX(-${index * 100 / total}%)`;
  dots.forEach(d=>d.classList.remove('active'));
  dots[index].classList.add('active');
}

// 切换下一张
function next(){
  index++;
  if(index >= total) index = 0;
  changeSlide();
}
// 切换上一张
function prev(){
  index--;
  if(index < 0) index = total - 1;
  changeSlide();
}

// 绑定按钮点击
nextBtn.onclick = next;
prevBtn.onclick = prev;

// 自动轮播 3秒切换
function autoPlay(){
  timer = setInterval(next, 3000);
}
autoPlay();

// 鼠标悬停暂停，离开继续
document.querySelector('.slider-box').onmouseenter = ()=> clearInterval(timer);
document.querySelector('.slider-box').onmouseleave = autoPlay;
</script>
</body>
</html>
