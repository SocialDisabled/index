<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

.bg-fixed {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: url("photo/44.webp") center top / cover no-repeat;
}
body {
  min-height: 200vh;
  padding: 0 20px;
  padding-top: 70px;
}

.top-nav{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 999;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.top-nav a{
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.9;
  cursor: pointer;
}
.top-nav a:hover{
  opacity: 1;
}


.full-dropdown {
  position: fixed;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100vh - 60px);
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 998;

  transform: translateY(-100%);
  transition: transform 0.4s ease;
  display: grid;
  grid-template-columns: 1fr 4fr;
  color: #fff;
  pointer-events: none;
  visibility: hidden;
}
.full-dropdown.open {
  transform: translateY(0);
  pointer-events: auto;
  visibility: visible;
}


.full-dropdown-left {
  background: rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
}
.full-dropdown-item {
  padding: 0 30px;
  flex: 1;
  display: flex;
  align-items: center;
  cursor: pointer;
  border-left: 4px solid transparent;
  transition: 0.2s;
  font-size: 16px;
  background: transparent;
}

.full-dropdown-item.active {
  background: rgba(0,0,0,0.35);
  border-left-color: #ffd288;
}
.full-dropdown-item:hover {
  background: rgba(255,255,255,0.08);
}


.full-dropdown-right {
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.full-dropdown-title {
  font-size: 26px;
  margin-bottom: 16px;
}
.full-dropdown-desc {
  font-size: 16px;
  opacity: 0.85;
  margin-bottom: 24px;
  line-height: 1.7;
  max-width: 600px;
}
.full-dropdown-link {
  display: inline-block;
  padding: 12px 30px;
  border-radius: 30px;
  background: #ffd288;
  color: #000;
  text-decoration: none;
  font-size: 16px;
  width: fit-content;
}
.full-dropdown-link:hover {
  background: #ffdfaa;
}

@media (max-width: 720px) {
  .top-nav {
    gap: 12px;
  }
  .top-nav a {
    font-size: 12px;
  }
  .full-dropdown {
    grid-template-columns: 1fr 2fr;
  }
  .full-dropdown-title {
    font-size: 20px;
  }
  .full-dropdown-desc {
    font-size: 14px;
  }
  .full-dropdown-item {
    padding: 0 15px;
    font-size: 14px;
  }
}

.wrap-box{
  max-width: 1200px;
  margin: 20px auto 0;
}

.slider-box {
  width: 100%;
  height: 420px;
  overflow: hidden;
  position: relative;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
 }

@media (max-width: 720px) {
  .slider-box {
    height: 260px;
  }
  .slider-text h2 {
    font-size: 24px !important;
  }
  .slider-text p {
    font-size: 13px !important;
  }
  .slider-text {
    padding: 12px 16px;
  }
}

.slider-wrap {
  width: 800%;
  height: 100%;
  display: flex;
  transition: 0.6s ease;
}
.slider-item {
  width: 12.5%;
  height: 100%;
}
.slider-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.slider-mask {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 45%;
  background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.25) 60%, transparent 100%);
  z-index: 2;
  pointer-events: none;
}

.slider-text {
  position: absolute;
  left: 30px;
  bottom: 40px;
  z-index: 3;
  color: white;
  padding: 18px 22px;
  border-radius: 16px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.slider-text p{
  font-size: 16px;
  margin-bottom: 8px;
  opacity: 0.85;
}
.slider-text h2 {
  font-size: 36px;
  margin: 10px 0 20px;
}
.slider-text .btn-link {
  display: inline-block;
  padding: 11px 28px;
  border-radius: 30px;
  background: #ffd288;
  font-size: 16px;
  cursor: pointer;
  color: #000;
  text-decoration: none;
}
.slider-text .btn-link:hover{
  background: #ffdfaa;
}

.slider-btn {
  width: 40px;
  height: 60px;
  background: rgba(0,0,0,0.35);
  color: #fff;
  font-size: 26px;
  border: none;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  z-index: 4;
}
.slider-btn:hover{
  background: rgba(0,0,0,0.55);
}
.prev { left: 10px; }
.next { right: 10px; }

.slider-dots {
  position: absolute;
  bottom: 30px;
  right: 30px;
  display: flex;
  gap: 8px;
  z-index: 4;
}
.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #ffffff50;
  cursor: pointer;
}
.dot.active {
  background: #fff;
}

.main-content{
  width: 100%;
  margin: 30px 0 200px;
  padding: 40px 30px;
  background: rgba(255,255,255,0.88);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}
.main-content h6{
  color: #666;
  font-size: 16px;
  margin-bottom: 10px;
}
.main-content h1{
  font-size: 32px;
  color: #222;
  margin-bottom: 20px;
}
.main-content video {
  width: 100%;
  border-radius: 12px;
  margin-top: 20px;
}
@media (max-width:720px){
  .main-content {
    padding: 20px 15px;
  }
  .main-content h1 {
    font-size: 24px;
  }
}

.egg-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: 0.25s ease;
}
.egg-modal.show {
  opacity: 1;
  pointer-events: auto;
}
.egg-modal video {
  width: 96%;
  max-width: 950px;
  border-radius: 8px;
  box-shadow: 0 0 40px #000;
}

.egg-close {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
}
.egg-close:hover {
  background: rgba(255,255,255,0.3);
}

.secret-egg {
  position: fixed;
  left: 8px;
  bottom: 8px;
  font-size: 10px;
  color: rgba(255,255,255,0.08);
  text-decoration: none;
  z-index: 99;
  transition: all 0.3s ease;
  padding: 4px;
}
.secret-egg:hover {
  color: rgba(255,255,255,0.7);
  font-size: 12px;
}
</style>
</head>
<body>

<div class="bg-fixed"></div>

<div class="top-nav">

  <a href="#">支持</a>

</div>


<div class="full-dropdown" id="fullDropdown">
  <div class="full-dropdown-left">
    <div class="full-dropdown-item active" data-id="mod">MC联机</div>
    <div class="full-dropdown-item" data-id="launcher">泰拉瑞亚联机</div>
    <div class="full-dropdown-item" data-id="guide">星露谷联机</div>
    <div class="full-dropdown-item" data-id="faq">饥荒联机</div>
    <div class="full-dropdown-item" data-id="community">待开发</div>
  </div>
  <div class="full-dropdown-right" id="dropdownRight">
    <h3 class="full-dropdown-title">MC联机</h3>
    <p class="full-dropdown-desc">简简单单的服务器，没啥亮眼。</p>
    <a class="full-dropdown-link" href="https://kurlet.com" target="_blank">前往查看</a>
  </div>
</div>

<div class="wrap-box">
  
  <div class="slider-box">
    <div class="slider-wrap">
     
      <div class="slider-item"><img loading="lazy" src="photo/11.webp" alt="图1"></div>
      <div class="slider-item"><img loading="lazy" src="photo/22.webp" alt="图2"></div>
      <div class="slider-item"><img loading="lazy" src="photo/33.webp" alt="图3"></div>
      <div class="slider-item"><img loading="lazy" src="photo/44.webp" alt="图4"></div>
      <div class="slider-item"><img loading="lazy" src="photo/55.webp" alt="图5"></div>
      <div class="slider-item"><img loading="lazy" src="photo/66.webp" alt="图6"></div>
      <div class="slider-item"><img loading="lazy" src="photo/77.webp" alt="图7"></div>
      <div class="slider-item"><img loading="lazy" src="photo/88.webp" alt="图8"></div>
    </div>
    <div class="slider-mask"></div>
    <div class="slider-text">
      <p>Kurlet-库乐特引导页面官网</p>
      <h2>欢迎访问</h2>
     
      <a class="btn-link" href="#main">了解更多</a>
    </div>
    <button class="slider-btn prev">&lt;</button>
    <button class="slider-btn next">&gt;</button>
    <div class="slider-dots"></div>
  </div>

  
  <div id="main" class="main-content">
    <h1>这是一个引导页面</h1>
    <h3>这是一个官网</h3>
    <h1>天不生我唐人海，万古如长夜</h1>
    <h3>天不生，妈妈生的</h3>
    <a href="https://mc.kurlet.com" target="_blank">测试中！！！！
</a>
  </div>
</div>

<div class="egg-modal" id="eggModal">
  <div class="egg-close" id="eggClose">&times;</div>
  <video id="eggVideo" src="video/rickroll.mp4" controls></video>
</div>

<script>
const total = 8;
let index = 0;
const wrap = document.querySelector('.slider-wrap');
const dotsBox = document.querySelector('.slider-dots');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');
let timer;

for(let i=0; i<total; i++){
  const dot = document.createElement('span');
  dot.className = 'dot';
  if(i === 0) dot.classList.add('active');
  dotsBox.appendChild(dot);
  dot.onclick = ()=>{
    index = i;
    changeSlide();
  }
}
const dots = document.querySelectorAll('.dot');

function changeSlide(){
  wrap.style.transform = `translateX(-${index * 12.5}%)`;
  dots.forEach(d=>d.classList.remove('active'));
  dots[index].classList.add('active');
}

function next(){
  index++;
  if(index >= total) index = 0;
  changeSlide();
}

function prev(){
  index--;
  if(index < 0) index = total - 1;
  changeSlide();
}

nextBtn.onclick = next;
prevBtn.onclick = prev;

function autoPlay(){
  timer = setInterval(next, 3000);
}
autoPlay();

document.querySelector('.slider-box').onmouseenter = ()=> clearInterval(timer);
document.querySelector('.slider-box').onmouseleave = autoPlay;

const btn = document.querySelector('.btn-link');
const eggModal = document.getElementById('eggModal');
const eggVideo = document.getElementById('eggVideo');
const eggClose = document.getElementById('eggClose');

let clickCount = 0;
let clickTimer = null;

function openEggVideo() {
  eggModal.classList.add('show');
  eggVideo.play().catch(err=>console.log("播放失败:",err));
  clickCount = 0;
}

function closeEggVideo() {
  eggModal.classList.remove('show');
  eggVideo.pause();
  eggVideo.currentTime = 0;
}

btn.addEventListener('click', function(e) {
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    clickCount = 0;
  }, 3000);

  if (clickCount >= 3) {
    e.preventDefault();
    openEggVideo();
  } else {
    e.preventDefault();
    document.querySelector('#main').scrollIntoView({ behavior: 'smooth' });
  }
});

eggClose.addEventListener('click', closeEggVideo);
eggModal.addEventListener('click', e => {
  if (e.target === eggModal) closeEggVideo();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && eggModal.classList.contains('show')) closeEggVideo();
});


const moreToggle = document.getElementById('moreToggle');
const fullDropdown = document.getElementById('fullDropdown');
const leftItems = document.querySelectorAll('.full-dropdown-item');
const dropdownRight = document.getElementById('dropdownRight');


const menuData = {
  mod: {
    title: "MC联机",
    desc: "简简单单的服务器，没啥亮眼。",
    link: "https://kurlet.com"
  },
  launcher: {
    title: "泰拉瑞亚联机",
    desc: "还没开始做，目前只有MC联机。",
    link: "https://kurlet.com"
  },
  guide: {
    title: "星露谷联机",
    desc: "其实你完全可以走steam联机的对吧。",
    link: "https://kurlet.com"
  },
  faq: {
    title: "饥荒联机",
    desc: "还没搞，其实steam联机也不是不行。",
    link: "https://kurlet.com"
  },
  community: {
    title: "待开发",
    desc: "没准有个大的。",
    link: "https://kurlet.com"
  }
};


function updatePanel(id) {
  const data = menuData[id];
  dropdownRight.innerHTML = `
    <h3 class="full-dropdown-title">${data.title}</h3>
    <p class="full-dropdown-desc">${data.desc}</p>
    <a class="full-dropdown-link" href="${data.link}" target="_blank">前往查看</a>
  `;
  leftItems.forEach(item => item.classList.remove('active'));
  document.querySelector(`.full-dropdown-item[data-id="${id}"]`).classList.add('active');
}


function toggleDropdown() {
  fullDropdown.classList.toggle('open');
}
moreToggle.addEventListener('click', toggleDropdown);


leftItems.forEach(item => {
  item.addEventListener('click', () => {
    updatePanel(item.dataset.id);
  });
});


document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') {
    fullDropdown.classList.remove('open');
  }
});


document.addEventListener('click', (e) => {
  if (!fullDropdown.contains(e.target) && e.target !== moreToggle) {
    fullDropdown.classList.remove('open');
  }
});
</script>
</body>
