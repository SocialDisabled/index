<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MC基岩JAVA互通服务器</title>

<link rel="preload" href="photo/44.webp" as="image">
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}


.bg-fixed {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: url("photo/44.webp") center top / cover no-repeat;
}
body {
  min-height: 200vh;
  padding: 0 20px;
  padding-top: 70px;
}

.top-nav{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 999;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.top-nav a{
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.9;
}
.top-nav a:hover{
  opacity: 1;
}

.wrap-box{
  max-width: 1200px;
  margin: 20px auto 0;
}

.slider-box {
  width: 100%;
  height: 420px;
  overflow: hidden;
  position: relative;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
 }

.slider-wrap {
  width: 800%;
  height: 100%;
  display: flex;
  transition: 0.6s ease;
}
.slider-item {
  width: 100%;
  height: 100%;
}
.slider-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.slider-mask {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 45%;
  background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.25) 60%, transparent 100%);
  z-index: 2;
  pointer-events: none;
}

.slider-text {
  position: absolute;
  left: 30px;
  bottom: 40px;
  z-index: 3;
  color: white;
  padding: 18px 22px;
  border-radius: 16px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.slider-text p{
  font-size: 16px;
  margin-bottom: 8px;
  opacity: 0.85;
}
.slider-text h2 {
  font-size: 36px;
  margin: 10px 0 20px;
}
.slider-text .btn-link {
  display: inline-block;
  padding: 11px 28px;
  border-radius: 30px;
  background: #ffd288;
  font-size: 16px;
  cursor: pointer;
  color: #000;
  text-decoration: none;
}
.slider-text .btn-link:hover{
  background: #ffdfaa;
}

.slider-btn {
  width: 40px;
  height: 60px;
  background: rgba(0,0,0,0.35);
  color: #fff;
  font-size: 26px;
  border: none;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  z-index: 4;
}
.slider-btn:hover{
  background: rgba(0,0,0,0.55);
}
.prev { left: 10px; }
.next { right: 10px; }

.slider-dots {
  position: absolute;
  bottom: 30px;
  right: 30px;
  display: flex;
  gap: 8px;
  z-index: 4;
}
.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #ffffff50;
  cursor: pointer;
}
.dot.active {
  background: #fff;
}

.main-content{
  width: 100%;
  margin: 30px 0 200px;
  padding: 40px 30px;
  background: rgba(255,255,255,0.88);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}
.main-content h6{
  color: #666;
  font-size: 16px;
  margin-bottom: 10px;
}
.main-content h1{
  font-size: 32px;
  color: #222;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="bg-fixed"></div>

<div class="top-nav">
  <a href="">图片</a>
  <a href="">视频</a>
  <a href="#">下载</a>
  <a href="#">关于</a>
  <a href="#">支持</a>
  <a href="#">获取启动器</a>
</div>


<div class="wrap-box">
  
  <div class="slider-box">
    <div class="slider-wrap">
     
      <div class="slider-item"><img loading="lazy" src="photo/11.webp" alt="图1"></div>
      <div class="slider-item"><img loading="lazy" src="photo/22.webp" alt="图2"></div>
      <div class="slider-item"><img loading="lazy" src="photo/33.webp" alt="图3"></div>
      <div class="slider-item"><img loading="lazy" src="photo/44.webp" alt="图4"></div>
      <div class="slider-item"><img loading="lazy" src="photo/55.webp" alt="图5"></div>
      <div class="slider-item"><img loading="lazy" src="photo/66.webp" alt="图6"></div>
      <div class="slider-item"><img loading="lazy" src="photo/77.webp" alt="图7"></div>
      <div class="slider-item"><img loading="lazy" src="photo/88.webp" alt="图8"></div>
    </div>
    <div class="slider-mask"></div>
    <div class="slider-text">
      <p>MC基岩Java互通服务器</p>
      <h2>立即加入游玩</h2>
     
      <a class="btn-link" href="#main">了解更多</a>
    </div>
    <button class="slider-btn prev">&lt;</button>
    <button class="slider-btn next">&gt;</button>
    <div class="slider-dots"></div>
  </div>

  
  <div id="main" class="main-content">
    <h6>这是一个服务器</h6>
    <h1>这是一个官网</h1>
  </div>
</div>

<script>
const total = 8;
let index = 0;
const wrap = document.querySelector('.slider-wrap');
const dotsBox = document.querySelector('.slider-dots');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');
let timer;

for(let i=0; i<total; i++){
  const dot = document.createElement('span');
  dot.className = 'dot';
  if(i === 0) dot.classList.add('active');
  dotsBox.appendChild(dot);
  dot.onclick = ()=>{
    index = i;
    changeSlide();
  }
}
const dots = document.querySelectorAll('.dot');

function changeSlide(){
  wrap.style.transform = `translateX(-${index * 100 / total}%)`;
  dots.forEach(d=>d.classList.remove('active'));
  dots[index].classList.add('active');
}

function next(){
  index++;
  if(index >= total) index = 0;
  changeSlide();
}

function prev(){
  index--;
  if(index < 0) index = total - 1;
  changeSlide();
}

nextBtn.onclick = next;
prevBtn.onclick = prev;

function autoPlay(){
  timer = setInterval(next, 3000);
}
autoPlay();

document.querySelector('.slider-box').onmouseenter = ()=> clearInterval(timer);
document.querySelector('.slider-box').onmouseleave = autoPlay;


const btn = document.querySelector('.btn-link');
let clickCount = 0;
let clickTimer = null;
const rickUrl = 'https://www.bilibili.com/video/BV1GJ411x7h7/?spm_id_from=333.337.search-card.all.click&vd_source=fae5bc83340c2c9eb6ce230b387ed8ff';

btn.addEventListener('click', function(e) {
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    clickCount = 0;
  }, 3000);

  if(clickCount >= 3) {
    window.open(rickUrl, '_blank');
    clickCount = 0;
  } else {
    e.preventDefault();
    document.querySelector('#main').scrollIntoView({behavior: 'smooth'});
  }
});
</script>
</body>
</html>
